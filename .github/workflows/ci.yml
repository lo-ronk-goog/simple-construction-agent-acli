name: Agent CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: |
          docker build -t agent-ci-image .

      - name: Run Agent Evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Create a directory on the runner to store results
          mkdir -p ${{ github.workspace }}/eval_results
          
          # Run the container and mount the results directory
          docker run --rm \
            -e GEMINI_API_KEY=$GEMINI_API_KEY \
            -v ${{ github.workspace }}/eval_results:/app/app/.adk/eval_history \
            agent-ci-image \
            agents-cli eval run --evalset tests/eval/evalsets/basic.evalset.json

      - name: Upload Eval Results
        if: always() # Always upload results even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: ${{ github.workspace }}/eval_results/

  deploy:
    name: Deploy to Agent Platform
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') # Only run on version tags
    runs-on: ubuntu-latest
    environment: production # This enables the HITL manual approval gate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Tag
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying version $TAG_NAME to Agent Platform..."
          # Example of how you might use the tag in deployment:
          # docker run --rm -e GEMINI_API_KEY=$GEMINI_API_KEY agent-ci-image agents-cli deploy --version $TAG_NAME

name: Agent CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run Evals in Container
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker build -t agent-ci-image .
          # Run evaluations directly using the installed tool
          docker run --rm -e GEMINI_API_KEY=$GEMINI_API_KEY agent-ci-image agents-cli eval run --evalset tests/eval/evalsets/basic.evalset.json

  deploy:
    name: Deploy to Agent Platform
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') # Only run on version tags
    runs-on: ubuntu-latest
    environment: production # This enables the HITL manual approval gate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Tag
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying version $TAG_NAME to Agent Platform..."
          # Example of how you might use the tag in deployment:
          # docker run --rm -e GEMINI_API_KEY=$GEMINI_API_KEY agent-ci-image agents-cli deploy --version $TAG_NAME

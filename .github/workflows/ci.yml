name: Agent CI

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/152008061700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-runner-sa@lpr-gemini-enterprise-1.iam.gserviceaccount.com
          token_format: 'access_token'

      - name: Log in to Docker
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

      - name: Pull Shared Runner Image
        run: |
          docker pull us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest

      - name: Run Agent Evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Run the container and save all output to a file
          docker run --rm \
            -e GEMINI_API_KEY=$GEMINI_API_KEY \
            -e PYTHONWARNINGS="ignore" \
            -v ${{ github.workspace }}:/app \
            us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest \
            agents-cli eval run --evalset tests/eval/evalsets/basic.evalset.json > eval_output.txt 2>&1 || EXIT_CODE=$?
          
          # If successful, just print the summary. If failed, print everything.
          if [ -z "$EXIT_CODE" ]; then
            echo "Evals passed! Summary:"
            grep -A 5 "Eval Run Summary" eval_output.txt
          else
            echo "Evals failed! Full logs below:"
            cat eval_output.txt
            exit $EXIT_CODE
          fi

      - name: Upload Eval Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: ${{ github.workspace }}/app/.adk/eval_history/

  deploy:
    name: Deploy to Agent Platform
    needs: test-and-eval
    if: github.ref == 'refs/heads/main' # Run only on merge to main
    runs-on: ubuntu-latest
    environment: production # HITL approval gate
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can find tags

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/152008061700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-runner-sa@lpr-gemini-enterprise-1.iam.gserviceaccount.com
          token_format: 'access_token'

      - name: Log in to Docker
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

      - name: Get Latest Tag
        id: get_tag
        run: |
          echo "tag=$(git describe --tags --abbrev=0)" >> $GITHUB_OUTPUT

      - name: Deploy with Tag
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAG_NAME: ${{ steps.get_tag.outputs.tag }}
          GOOGLE_APPLICATION_CREDENTIALS: /app/gha-creds.json
        run: |
          echo "Deploying version $TAG_NAME to Agent Platform..."
          
          # Create a dummy gcloud script to satisfy the tool's project resolution
          echo '#!/bin/sh' > ${{ github.workspace }}/gcloud
          echo 'echo "lpr-gemini-enterprise-1"' >> ${{ github.workspace }}/gcloud
          chmod +x ${{ github.workspace }}/gcloud
          
          docker run --rm \
            -e GEMINI_API_KEY=$GEMINI_API_KEY \
            -e GOOGLE_APPLICATION_CREDENTIALS=$GOOGLE_APPLICATION_CREDENTIALS \
            -v ${{ github.workspace }}:/app \
            -v ${{ github.workspace }}/gcloud:/usr/local/bin/gcloud \
            -v ${{ steps.auth.outputs.credentials_file_path }}:/app/gha-creds.json \
            us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest \
            agents-cli deploy

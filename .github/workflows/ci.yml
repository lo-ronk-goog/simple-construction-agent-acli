name: Agent CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run Evals in Container
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          docker build -t agent-ci-image .
          docker run --rm -e GEMINI_API_KEY=$GEMINI_API_KEY agent-ci-image uv run agents-cli eval run --evalset tests/eval/evalsets/basic.evalset.json

name: Agent CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags:
      - 'v*' # Trigger on version tags
  workflow_dispatch:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/152008061700/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-runner-sa@lpr-gemini-enterprise-1.iam.gserviceaccount.com
          token_format: 'access_token'

      - name: Log in to Docker
        run: |
          echo "${{ steps.auth.outputs.access_token }}" | docker login -u oauth2accesstoken --password-stdin us-central1-docker.pkg.dev

      - name: Pull Shared Runner Image
        run: |
          docker pull us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest

      - name: Run Agent Evals
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Run the container and mount the entire workspace
          docker run --rm \
            -e GEMINI_API_KEY=$GEMINI_API_KEY \
            -v ${{ github.workspace }}:/app \
            us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest \
            agents-cli eval run --evalset tests/eval/evalsets/basic.evalset.json

      - name: Upload Eval Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: ${{ github.workspace }}/app/.adk/eval_history/

  deploy:
    name: Deploy to Agent Platform
    needs: test-and-eval
    if: startsWith(github.ref, 'refs/tags/v') # Only run on version tags
    runs-on: ubuntu-latest
    environment: production # This enables the HITL manual approval gate
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy with Tag
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          echo "Deploying version $TAG_NAME to Agent Platform..."
          # Example of how you might use the tag in deployment:
          # docker run --rm -e GEMINI_API_KEY=$GEMINI_API_KEY us-central1-docker.pkg.dev/lpr-gemini-enterprise-1/agent-cli-image/agent-cli-runner:latest agents-cli deploy --version $TAG_NAME
